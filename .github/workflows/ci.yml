name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Run ShellCheck
        run: shellcheck -x install.sh scripts/*.sh lib/*.sh

  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path setup.ps1 -Severity Error
          $results | Format-Table -AutoSize
          if ($results) { exit 1 }

  smoke:
    name: Smoke test (Ubuntu ${{ matrix.ubuntu }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ["22.04", "24.04"]
    container:
      image: ubuntu:${{ matrix.ubuntu }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare container (sudo + non-root user, like a real WSL setup)
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq sudo ca-certificates curl
          useradd -m -s /bin/bash student
          echo 'student ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/student
          chmod 0440 /etc/sudoers.d/student
          cp -r "$GITHUB_WORKSPACE" /home/student/app
          chown -R student:student /home/student/app
          chmod +x /home/student/app/install.sh /home/student/app/scripts/*.sh
      - name: Run installer (first pass)
        run: su - student -c 'cd ~/app && ./install.sh --all'
      - name: Run installer again (idempotency)
        run: su - student -c 'cd ~/app && ./install.sh --all'
      - name: Verify only
        run: su - student -c 'cd ~/app && ./install.sh --verify'
