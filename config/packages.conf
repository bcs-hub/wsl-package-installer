# Vali-IT Installer — süsteemi tööriistad (apt-paketid)
#
# Formaat:  apt-pakett | kontrollkäsk | kirjeldus (eesti keeles)
#
# Uue tööriista lisamiseks lisa üks rida. Paigaldus JA kontroll
# hakkavad automaatselt tööle — rohkem pole vaja midagi muuta.

curl              | curl    | Failide allalaadimise tööriist (curl)
unzip             | unzip   | Arhiivide lahtipakkija (unzip)
git               | git     | Versioonihaldus (git)
python3           | python3 | Python 3
python3-pip       | pip3    | Pythoni paketihaldur (pip3)
tree              | tree    | Kaustapuu kuvaja (tree)
jq                | jq      | JSON-i töötlemise tööriist (jq)
ripgrep           | rg      | Kiire tekstiotsing (ripgrep)
openjdk-21-jdk    | java    | Java 21 arenduskeskkond (OpenJDK)
poppler-utils     | pdfinfo | PDF-tööriistad (poppler-utils)
postgresql-client | psql    | PostgreSQL andmebaasiklient (psql)
