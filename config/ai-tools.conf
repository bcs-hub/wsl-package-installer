# Vali-IT Installer — AI ja arendustööriistad (eriloogikaga)
#
# Formaat:  id | kontrollkäsk | kirjeldus (eesti keeles)
#
# Iga id jaoks peab failis lib/installer.sh olema funktsioon
# install_tool_<id>. Uue tööriista lisamine = üks rida siin + üks
# funktsioon seal.
#
# NB! Järjekord on oluline: nvm enne node'i, node enne npm-i ja claude'i.

gh     | gh     | GitHub CLI (gh)
nvm    | nvm    | Node'i versioonihaldur (NVM)
node   | node   | Node.js (LTS)
npm    | npm    | Node'i paketihaldur (npm)
claude | claude | Claude Code (Anthropic)
