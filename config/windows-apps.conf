# Vali-IT Installer — Windowsi rakendused (paigaldatakse winget'iga)
#
# Formaat:  winget-id | kontrollkäsk | kirjeldus (eesti keeles) | PDF-juhend käsitsi paigalduseks | aja-vihje (valikuline)
#
# Rakendus loetakse olemasolevaks, kui winget tunneb ID ära VÕI
# kontrollkäsk on PATH-is (katab ka käsitsi/muul viisil paigaldatud
# versioonid, mida winget ID järgi ei tunne). '-' = kontrollkäsku pole.
# Olemasolevat paigaldust ei puututa ega uuendata — paigaldatakse ainult puuduv.
#
# 5. väli (aja-vihje) on valikuline: kui täidetud, kuvatakse paigalduse ajal
# selle rakenduse rea lõpus tavateate "(võib võtta mitu minutit)" asemel.

